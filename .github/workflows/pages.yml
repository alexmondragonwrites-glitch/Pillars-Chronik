name: Deploy Webtagebuch to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Statische Website bündeln
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Website veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
