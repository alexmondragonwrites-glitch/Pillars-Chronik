name: Wächterfeder tests

on:
  pull_request:
    branches: [main]
    paths:
      - "Wachterfeder starten.bat"
      - "tools/wachterfeder/**"
      - ".github/workflows/wachterfeder-tests.yml"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m compileall tools/wachterfeder

      - name: Run unit tests
        run: python -m unittest discover -s tools/wachterfeder/tests -v
